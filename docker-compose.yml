services:
  db:
    image: pgrouting/pgrouting:16-3.5-4.0
    container_name: campus-navigation-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_nav}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-campus_nav}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-navigation-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-campus_nav}
      ALEMBIC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-campus_nav}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
